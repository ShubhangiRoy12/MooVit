<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Login - Transport Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --secondary: #1d4ed8;
      --accent: #f59e0b;
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --text-color: #ffffff;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)),
        url('home_hero.png.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
      position: relative;
      overflow: hidden;
    }

    /* Abstract background shapes */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 10s ease-in-out infinite alternate;
    }
    body::before {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: rgba(37, 99, 235, 0.3);
    }
    body::after {
      bottom: -10%;
      right: -10%;
      width: 40vw;
      height: 40vw;
      background: rgba(245, 158, 11, 0.2);
      animation-delay: -5s;
    }
    
    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .auth-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .remember-container {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .remember-container input {
      margin-right: 8px;
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .auth-container a {
      color: var(--primary-light);
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 500;
    }

    .auth-container a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .auth-container button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .auth-container button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }
    
    .auth-container button[type="submit"]:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-footer p {
      margin-bottom: 8px;
    }

    .admin-link-inline {
      color: #f87171 !important;
    }
    
    .admin-link-inline:hover {
      color: #fca5a5 !important;
    }

    #error-msg {
      color: #ef4444;
      text-align: center;
      margin-bottom: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      .auth-container {
        padding: 40px 25px;
        border-radius: 20px;
        margin: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <form id="login-form">
      <h2>Login to MooVit.</h2>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="you@example.com" required>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" required>
      </div>
      
      <div class="form-options">
        <label class="remember-container">
          <input type="checkbox" id="remember">
          <span style="color: var(--text-muted);">Remember me</span>
        </label>
        <a href="#" id="forgot-link">Forgot password?</a>
      </div>

      <div id="error-msg"></div>
      
      <button type="submit">Login</button>
      
      <div class="auth-footer">
        <p>New? <a href="register.html">Register here</a></p>
        <p><a href="admin.html" class="admin-link-inline">🔐 Admin Portal</a></p>
      </div>
    </form>
  </div>
  
  <script>
    // populate email if remembered
    window.addEventListener('load', function () {
      const saved = localStorage.getItem('rememberedEmail');
      if (saved) {
        document.getElementById('email').value = saved;
        document.getElementById('remember').checked = true;
      }
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = '';

      // Email validation
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      // Password strength validation
      // Minimum 8 characters, at least one uppercase, one lowercase, one digit, and one special character
      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPasswordPattern.test(password)) {
        errorMsg.textContent = 'Password must be at least 8 characters and include upper, lower, number, and special char.';
        return;
      }

      // handle remember me
      if (remember) {
        localStorage.setItem('rememberedEmail', email);
      } else {
        localStorage.removeItem('rememberedEmail');
      }
      // If all validations pass, redirect
      window.location.href = 'main.html';
    });

    // simple placeholder for forgot password
    document.getElementById('forgot-link').addEventListener('click', function (e) {
      e.preventDefault();
      alert('Forgot password functionality is not available in this demo.');
    });
  </script>
</body>

</html>
