<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register - MooVit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 40px;

      background:
        linear-gradient(
          rgba(2, 6, 23, 0.82),
          rgba(2, 6, 23, 0.92)
        ),
        url('https://images.pexels.com/photos/1637438/pexels-photo-1637438.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');

      background-size: cover;
      background-position: center;

      overflow: hidden;
      color: white;
    }

    .register-container {
      position: relative;

      width: 100%;
      max-width: 520px;

      background: rgba(10, 15, 35, 0.72);

      backdrop-filter: blur(18px);

      border: 1px solid rgba(255, 255, 255, 0.08);

      border-radius: 32px;

      padding: 55px 45px;

      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.45),
        0 0 40px rgba(37, 99, 235, 0.12);

      animation: fadeUp 0.6s ease;
      transition: 0.35s ease;
    }

    .register-container:hover {
      transform: translateY(-5px);

      box-shadow:
        0 35px 70px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(37, 99, 235, 0.18);
    }

    .close-btn {
      position: absolute;

      top: 22px;
      right: 22px;

      width: 42px;
      height: 42px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 50%;

      background: rgba(255, 255, 255, 0.06);

      border: 1px solid rgba(255, 255, 255, 0.08);

      color: white;

      text-decoration: none;

      font-size: 22px;
      font-weight: 700;

      transition: 0.3s ease;
    }

    .close-btn:hover {
      background: rgba(37, 99, 235, 0.22);

      transform: rotate(90deg);
    }

    .logo {
      text-align: center;

      margin-bottom: 10px;

      font-size: 4rem;
    }

    h1 {
      text-align: center;

      font-size: 2.5rem;
      font-weight: 800;

      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;

      color: #cbd5e1;

      margin-bottom: 40px;

      line-height: 1.6;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;

      margin-bottom: 10px;

      font-size: 0.95rem;
      font-weight: 600;

      color: #f1f5f9;
    }

    .input-group input {
      width: 100%;

      padding: 18px;

      border-radius: 18px;

      border: 1px solid rgba(255, 255, 255, 0.1);

      background: rgba(255, 255, 255, 0.05);

      color: white;

      font-size: 1rem;

      outline: none;

      transition: 0.3s ease;
    }

    .input-group input::placeholder {
      color: #94a3b8;
    }

    .input-group input:focus {
      border-color: #2563eb;

      box-shadow:
        0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .terms {
      display: flex;
      align-items: center;

      gap: 10px;

      margin-bottom: 28px;

      color: #cbd5e1;

      font-size: 0.95rem;
    }

    .terms a {
      color: #60a5fa;
      text-decoration: none;
    }

    .register-btn {
      width: 100%;

      padding: 18px;

      border: none;

      border-radius: 18px;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      color: white;

      font-size: 1rem;
      font-weight: 700;

      cursor: pointer;

      transition: 0.3s ease;

      box-shadow:
        0 15px 35px rgba(37, 99, 235, 0.35);
    }

    .register-btn:hover {
      transform: translateY(-3px);

      box-shadow:
        0 20px 45px rgba(37, 99, 235, 0.45);
    }

    .bottom-text {
      text-align: center;

      margin-top: 28px;

      color: #cbd5e1;
    }

    .bottom-text a {
      color: #60a5fa;

      text-decoration: none;

      font-weight: 600;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 20px;
      }

      .register-container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="register-container">

    <a href="index.html" class="close-btn">
      ✕
    </a>

    <div class="logo">🚚</div>

    <h1>Create Account</h1>

    <p class="subtitle">
      Join MooVit and start managing your shipments
      smarter and faster.
    </p>

    <form>

      <div class="input-group">
        <label>👤 Full Name</label>

        <input
          type="text"
          placeholder="Enter your full name"
          required>
      </div>

      <div class="input-group">
        <label>📧 Email Address</label>

        <input
          type="email"
          placeholder="Enter your email"
          required>
      </div>

      <div class="input-group">
        <label>🔒 Password</label>

        <input
          type="password"
          placeholder="Create password"
          required>
      </div>

      <div class="input-group">
        <label>🔐 Confirm Password</label>

        <input
          type="password"
          placeholder="Confirm password"
          required>
      </div>

      <div class="terms">
        <input type="checkbox" required>

        <span>
          I agree to the
          <a href="#">Terms & Conditions</a>
        </span>
      </div>

      <button type="submit" class="register-btn">
        Create Account
      </button>

    </form>

    <div class="bottom-text">
      Already have an account?
      <a href="login.html">Login</a>
    </div>

  </div>

</body>

</html>
