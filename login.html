<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - MooVit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

      background:
        linear-gradient(
          rgba(2, 6, 23, 0.82),
          rgba(2, 6, 23, 0.92)
        ),
        url('https://images.pexels.com/photos/1637438/pexels-photo-1637438.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');

      background-size: cover;
      background-position: center;

      overflow: hidden;
      color: white;
    }

    .auth-container {
            position:relative;

      
      width: 100%;
      max-width: 500px;

      padding: 55px 45px;

      border-radius: 32px;

      background: rgba(15, 23, 42, 0.78);

      backdrop-filter: blur(18px);

      border: 1px solid rgba(255, 255, 255, 0.08);

      box-shadow:
        0 25px 70px rgba(0, 0, 0, 0.45),
        0 0 50px rgba(37, 99, 235, 0.14);

      animation: fadeUp 0.55s ease;
      transition: 0.35s ease;
    }
.close-btn{
  position:absolute;

  top:22px;
  right:24px;

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  text-decoration:none;

  font-size:20px;
  font-weight:700;

  transition:0.3s ease;
}

.close-btn:hover{
  background:rgba(37,99,235,0.22);

  transform:rotate(90deg);
}
    .auth-container:hover {
      transform: translateY(-5px);

      box-shadow:
        0 35px 80px rgba(0, 0, 0, 0.5),
        0 0 70px rgba(37, 99, 235, 0.2);
    }

    .logo {
      display: flex;
      justify-content: center;
      align-items: center;

      width: 100%;

      font-size: 70px;

      margin-bottom: 18px;
    }

    h1 {
      text-align: center;

      font-size: 3rem;
      font-weight: 800;

      margin-bottom: 12px;

      letter-spacing: -1px;
    }

    .subtitle {
      text-align: center;

      color: #cbd5e1;

      line-height: 1.7;

      margin-bottom: 40px;

      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;

      margin-bottom: 10px;

      font-size: 0.95rem;
      font-weight: 600;

      color: #f1f5f9;
    }

    .auth-container input {
      width: 100%;

      padding: 17px 18px;

      border-radius: 18px;

      border: 1px solid rgba(255, 255, 255, 0.08);

      background: rgba(255, 255, 255, 0.05);

      color: white;

      font-size: 1rem;

      transition: 0.3s ease;

      outline: none;
    }

    .auth-container input::placeholder {
      color: #94a3b8;
    }

    .auth-container input:focus {
      border-color: #3b82f6;

      background: rgba(255, 255, 255, 0.08);

      box-shadow:
        0 0 20px rgba(59, 130, 246, 0.25);
    }

    .remember-row {
      display: flex;
      align-items: center;

      gap: 10px;

      margin-top: 5px;
      margin-bottom: 20px;

      color: #cbd5e1;
    }

    .remember-row input {
      width: auto;
    }

    button {
      width: 100%;

      padding: 18px;

      border: none;

      border-radius: 18px;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      color: white;

      font-size: 1rem;
      font-weight: 700;

      cursor: pointer;

      transition: 0.3s ease;

      box-shadow:
        0 15px 35px rgba(37, 99, 235, 0.35);
    }

    button:hover {
      transform: translateY(-3px);

      box-shadow:
        0 20px 45px rgba(37, 99, 235, 0.45);
    }

    .forgot-link {
      text-align: center;

      margin-top: 20px;
    }

    .forgot-link a {
      color: #60a5fa;

      text-decoration: none;

      font-size: 0.95rem;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .bottom-links {
      margin-top: 28px;

      text-align: center;

      color: #cbd5e1;

      line-height: 1.8;
    }

    .bottom-links a {
      color: #60a5fa;

      text-decoration: none;

      font-weight: 600;
    }

    .bottom-links a:hover {
      text-decoration: underline;
    }

    .admin-link {
      color: #f87171 !important;
    }

    #error-msg {
      color: #f87171;

      text-align: center;

      margin-bottom: 15px;

      font-size: 14px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .auth-container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 2.3rem;
      }

      .logo {
        font-size: 56px;
      }
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <a href="index.html" class="close-btn">
  ✕
</a>

    <div class="logo">
      🚚
    </div>

    <h1>Login to MooVit.</h1>


    <form id="login-form">

      <div class="form-group">
        <label> Email Address</label>

        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required>
      </div>

      <div class="form-group">
        <label> Password</label>

        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember">

        <span> Remember me</span>
      </div>

      <div id="error-msg"></div>

      <button type="submit">
        Login
      </button>

      <div class="forgot-link">
        <a href="#" id="forgot-link">
           Forgot password?
        </a>
      </div>

      <div class="bottom-links">
        New here?
        <a href="register.html">
          Register here
        </a>

        <br><br>

        <a href="admin.html" class="admin-link">
         Admin Portal
        </a>
      </div>

    </form>

  </div>

  <script>

    window.addEventListener('load', () => {

      const savedEmail =
        localStorage.getItem('rememberedEmail');

      if (savedEmail) {

        document.getElementById('email').value =
          savedEmail;

        document.getElementById('remember').checked =
          true;
      }
    });

    document
      .getElementById('login-form')
      .addEventListener('submit', function (e) {

        e.preventDefault();

        const email =
          document.getElementById('email').value.trim();

        const password =
          document.getElementById('password').value;

        const remember =
          document.getElementById('remember').checked;

        const errorMsg =
          document.getElementById('error-msg');

        errorMsg.textContent = '';

        const emailPattern =
          /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailPattern.test(email)) {

          errorMsg.textContent =
            'Please enter a valid email address.';

          return;
        }

        if (password.length < 6) {

          errorMsg.textContent =
            'Password must be at least 6 characters.';

          return;
        }

        if (remember) {

          localStorage.setItem(
            'rememberedEmail',
            email
          );

        } else {

          localStorage.removeItem(
            'rememberedEmail'
          );
        }

        window.location.href = 'main.html';
      });

    document
      .getElementById('forgot-link')
      .addEventListener('click', function (e) {

        e.preventDefault();

        alert(
          'Forgot password feature is not available in this demo.'
        );
      });

  </script>

</body>

</html>
