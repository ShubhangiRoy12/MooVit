<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Login - Transport Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* theme variables copied from index.html */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');
    :root {
      --primary: #2563eb;
      --primary-light: #2d5a87;
      --secondary: #1d4ed8;
      --accent: #f59e0b;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --bg-overlay: rgba(255, 255, 255, 0.9);
      --text-color: #1a1a1a;
      --header-bg: rgba(255, 255, 255, 0.9);
      --header-scrolled-bg: rgba(255, 255, 255, 0.95);
      --nav-color: rgba(0, 0, 0, 0.7);
      --nav-hover: #000000;
      --search-bg: rgba(0, 0, 0, 0.05);
      --search-border: rgba(0, 0, 0, 0.1);
      --btn-bg: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      --btn-shadow: rgba(29, 78, 216, 0.4);
      --border-color: rgba(0, 0, 0, 0.1);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url('https://images.pexels.com/photos/1637438/pexels-photo-1637438.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
    }

    .auth-container {
      background: var(--bg-overlay);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--glass-border);
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--text-color);
    }

    .auth-container label {
      display: block;
      margin-bottom: 15px;
      color: var(--text-color);
      font-weight: 600;
    }

    .auth-container input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid var(--border-color);
      border-radius: 5px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.7);
      color: #000;
    }

    .auth-container button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: filter 0.3s ease;
      box-shadow: 0 4px 15px var(--btn-shadow);
    }

    .auth-container button:hover {
      filter: brightness(0.9);
    }

    .auth-container p {
      text-align: center;
      margin-top: 20px;
      color: var(--text-color);
    }

    .auth-container a {
      color: var(--primary);
      text-decoration: none;
    }

    .auth-container a:hover {
      text-decoration: underline;
    }

    .form-toggle {
      display: none;
    }

    .form-toggle.active {
      display: block;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .checkbox-label span {
      font-weight: 500;
      color: var(--text-color);
    }

    /* Admin link styling */
    .admin-link-inline {
      color: #e74c3c !important;
      font-weight: 500;
    }

    .admin-link-inline:hover {
      color: #c0392b !important;
      text-decoration: underline !important;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      .auth-container {
        width: 100%;
        max-width: 350px;
      }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 25px;
      }

      .auth-container p {
        font-size: 14px;
        line-height: 1.5;
      }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 25px;
      }

      .auth-container p {
        font-size: 14px;
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <form id="login-form" class="form-toggle active">
      <h2>Login to MooVit.</h2>
      <label>Email
        <input type="email" name="email" id="email" required>
      </label>
      <label>Password
        <input type="password" name="password" id="password" required>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="remember">
        <span>Remember me</span>
      </label>
      <div id="login-error-msg" style="color: red; text-align:center; margin-top:10px;"></div>
      <button type="submit">Login</button>
      <p style="margin-top:12px;"><a href="#" id="forgot-link">Forgot password?</a></p>
      <p>New? <a href="#" id="show-register">Register here</a> | <a href="./admin.html" class="admin-link-inline">🔐 Admin Portal</a></p>
    </form>

    <form id="register-form" class="form-toggle">
      <h2>Sign Up at Transport Co.</h2>
      <label>Name
        <input type="text" name="name" id="reg-name" placeholder="Your full name" required>
      </label>
      <label>Email
        <input type="email" name="email" id="reg-email" placeholder="you@example.com" required>
      </label>
      <label>Password
        <input id="reg-pwd" type="password" placeholder="Create password" required>
      </label>
      <label>Confirm Password
        <input id="reg-cpwd" type="password" placeholder="Confirm password" required>
      </label>
      <div id="reg-error-msg" style="color: #ffb3b3; text-align:center; margin-top:10px;"></div>
      <button type="submit">Register</button>
      <p>Already have an account? <a href="#" id="show-login">Login</a></p>
    </form>
  </div>
  
  <script>
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    document.getElementById('show-register').addEventListener('click', function (e) {
      e.preventDefault();
      loginForm.classList.remove('active');
      registerForm.classList.add('active');
    });

    document.getElementById('show-login').addEventListener('click', function (e) {
      e.preventDefault();
      registerForm.classList.remove('active');
      loginForm.classList.add('active');
    });

    window.addEventListener('load', function () {
      const saved = localStorage.getItem('rememberedEmail');
      if (saved) {
        document.getElementById('email').value = saved;
        document.getElementById('remember').checked = true;
      }
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const errorMsg = document.getElementById('login-error-msg');
      errorMsg.textContent = '';

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPasswordPattern.test(password)) {
        errorMsg.textContent = 'Password must be at least 8 characters and include uppercase, lowercase, number, and special character.';
        return;
      }

      if (remember) {
        localStorage.setItem('rememberedEmail', email);
      } else {
        localStorage.removeItem('rememberedEmail');
      }
      window.location.href = 'main.html';
    });

    document.getElementById('register-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pwd').value;
      const confirmPassword = document.getElementById('reg-cpwd').value;
      const errorMsg = document.getElementById('reg-error-msg');
      errorMsg.textContent = '';

      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      const namePattern = /^[A-Za-z ]+$/;
      if (!namePattern.test(name)) {
        errorMsg.textContent = 'Name should contain only alphabets and spaces.';
        return;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPasswordPattern.test(password)) {
        errorMsg.textContent = 'Password must be at least 8 characters and include uppercase, lowercase, number, and special character.';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      alert('Registration successful! Please login.');
      registerForm.classList.remove('active');
      loginForm.classList.add('active');
      registerForm.reset();
    });

    document.getElementById('forgot-link').addEventListener('click', function (e) {
      e.preventDefault();
      alert('Forgot password functionality is not available in this demo.');
    });
  </script>
</body>

</html>
