<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Login / Register - MooVit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #1d4ed8;
      --bg-overlay: rgba(255, 255, 255, 0.92);
      --text-color: #1a1a1a;
      --glass-border: rgba(255, 255, 255, 0.2);
      --btn-bg: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
      --btn-shadow: rgba(29, 78, 216, 0.4);
      --border-color: rgba(0, 0, 0, 0.15);
    }

    *, *::before, *::after {
      box-sizing: border-box; /* FIX: prevents input overflow */
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url('https://images.pexels.com/photos/1637438/pexels-photo-1637438.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
    }

    /* === WRAPPER === */
    .auth-wrapper {
      width: 100%;
      max-width: 400px;
      position: relative; /* FIX: no absolute/fixed stacking */
    }

    /* === TAB TOGGLE === */
    .tab-toggle {
      display: flex;
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      border: 1px solid var(--border-color);
      border-bottom: none;
    }

    .tab-toggle button {
      flex: 1;
      padding: 14px;
      border: none;
      background: rgba(255,255,255,0.6);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: all 0.25s ease;
    }

    .tab-toggle button.active {
      background: white;
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
    }

    /* === FORM CONTAINER === */
    .auth-container {
      background: white;
      padding: 35px 30px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border: 1px solid var(--border-color);
    }

    /* FIX: only ONE form visible at a time */
    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    /* === FORM ELEMENTS === */
    .auth-form h2 {
      text-align: center;
      margin: 0 0 24px;
      font-size: 22px;
      color: var(--text-color);
    }

    .auth-form label {
      display: block;
      margin-bottom: 14px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-color);
    }

    .auth-form input[type="text"],
    .auth-form input[type="email"],
    .auth-form input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      margin-top: 5px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 14px;
      background: rgba(255,255,255,0.8);
      color: #000;
      transition: border-color 0.2s;
    }

    .auth-form input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-weight: 400;
      font-size: 14px;
    }

    .auth-form button[type="submit"] {
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: var(--btn-bg);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.3s ease;
      box-shadow: 0 4px 15px var(--btn-shadow);
    }

    .auth-form button[type="submit"]:hover {
      filter: brightness(0.9);
    }

    .error-msg {
      color: #dc2626; /* FIX: visible red, not light pink */
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    .auth-form p {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #555;
    }

    .auth-form a {
      color: var(--primary);
      text-decoration: none;
    }

    .auth-form a:hover {
      text-decoration: underline;
    }

    .admin-link {
      color: #dc2626 !important;
      font-weight: 500;
    }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      body {
        padding: 15px;
        align-items: flex-start;
        padding-top: 40px;
      }

      .auth-container {
        padding: 25px 20px;
      }

      .auth-form h2 {
        font-size: 19px;
      }
  </style>
</head>
<body>

  <div class="auth-wrapper">

    <!-- TAB BUTTONS -->
    <div class="tab-toggle">
      <button class="active" onclick="showTab('login')" id="tab-login">Login</button>
      <button onclick="showTab('register')" id="tab-register">Sign Up</button>
    </div>

    <div class="auth-container">

      <!-- LOGIN FORM -->
      <div class="auth-form active" id="form-login">
        <h2>Login to MooVit</h2>
        <form id="login-form" onsubmit="handleLogin(event)">
          <label>Email
            <input type="email" id="login-email" required>
          </label>
          <label>Password
            <input type="password" id="login-password" required>
          </label>
          <label class="remember-row">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <div class="error-msg" id="login-error"></div>
          <button type="submit">Login</button>
          <p><a href="#" id="forgot-link" onclick="alert('Forgot password is not available in this demo.'); return false;">Forgot password?</a></p>
          <p>New here? <a href="#" onclick="showTab('register'); return false;">Sign Up</a> | <a href="admin.html" class="admin-link">🔐 Admin Portal</a></p>
        </form>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form" id="form-register">
        <h2>Create Account</h2>
        <form id="register-form" onsubmit="handleRegister(event)">
          <label>Full Name
            <input type="text" id="reg-name" placeholder="Your full name" required>
          </label>
          <label>Email
            <input type="email" id="reg-email" placeholder="you@example.com" required>
          </label>
          <label>Password
            <input type="password" id="reg-pwd" placeholder="Create password" required>
          </label>
          <label>Confirm Password
            <input type="password" id="reg-cpwd" placeholder="Confirm password" required>
          </label>
          <div class="error-msg" id="register-error"></div>
          <button type="submit">Create Account</button>
          <p>Already registered? <a href="#" onclick="showTab('login'); return false;">Login here</a></p>
        </form>
      </div>

    </div>
  </div>

  <script>
    // === TAB TOGGLE FUNCTION ===
    function showTab(tab) {
      // Hide all forms
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.tab-toggle button').forEach(b => b.classList.remove('active'));

      // Show selected form
      document.getElementById('form-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    // === LOGIN HANDLER ===
    window.addEventListener('load', function () {
      const saved = localStorage.getItem('rememberedEmail');
      if (saved) {
        document.getElementById('login-email').value = saved;
        document.getElementById('remember').checked = true;
      }
    });

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('remember').checked;
      const errorMsg = document.getElementById('login-error');
      errorMsg.textContent = '';

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      const strongPwd = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPwd.test(password)) {
        errorMsg.textContent = 'Password must be 8+ chars with uppercase, lowercase, number & special character.';
        return;
      }

      if (remember) {
        localStorage.setItem('rememberedEmail', email);
      } else {
        localStorage.removeItem('rememberedEmail');
      }

      window.location.href = 'main.html';
    }

    // === REGISTER HANDLER ===
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pwd').value;
      const confirmPassword = document.getElementById('reg-cpwd').value;
      const errorMsg = document.getElementById('register-error');
      errorMsg.textContent = '';

      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      if (!/^[A-Za-z ]+$/.test(name)) {
        errorMsg.textContent = 'Name should contain only letters and spaces.';
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      const strongPwd = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPwd.test(password)) {
        errorMsg.textContent = 'Password must be 8+ chars with uppercase, lowercase, number & special character.';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
