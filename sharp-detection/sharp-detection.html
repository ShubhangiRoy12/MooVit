<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../favicon.png">
  <title>Sharp Object Detection - MooVit</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script src="../scripts/detection-core.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #004080;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a {
      background-color: #ffffff;
      color: #004080;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      padding: 2rem;
    }

    #wrapper {
      position: relative;
      display: inline-block;
      margin-top: 1rem;
    }

    video,
    canvas {
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      border: 2px solid #004080;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background-color: #e0e0e0;
      margin-top: 3rem;
    }

    .description {
      margin-bottom: 1rem;
      font-size: 1.1rem;
      color: #333;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .controls label {
      font-weight: 600;
      color: #333;
    }

    .controls select {
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #ced4da;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Sharp Object Detection</h1>
    <a href="../main.html" class="btn btn-light">← Home</a>
  </header>

  <main>
    <p class="description">
      Show a sharp object like a knife or scissors in front of the webcam. This tool will identify and announce it
      aloud.
    </p>
    <div class="controls">
      <label for="voiceLang">Voice language</label>
      <select id="voiceLang" aria-label="Voice alert language">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
      </select>
    </div>
    <div id="wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <p><small>Powered by TensorFlow.js and COCO-SSD. Works best in good lighting.</small></p>
  </main>

  <footer>
    <p>&copy; 2025 MooVit.</p>
  </footer>

  <script src="sharp-detection.js"></script>
</body>

</html>
