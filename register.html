<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Register - Transport Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transport.css">
  <script>
    // Set theme immediately to avoid styling flash
    (() => {
      const savedTheme = localStorage.getItem('moovit-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    :root {
      --floating-label-bg: #ffffff;
    }
    :root[data-theme="dark"],
    body[data-theme="dark"] {
      --floating-label-bg: #0d1527;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Decorative Glow spheres in Background */
    .glow-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }
    
    .glow-sphere {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      transition: background 0.3s ease;
    }
    
    .sphere-1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--button-primary) 0%, transparent 70%);
      animation: float-glow 20s infinite alternate;
    }
    
    .sphere-2 {
      bottom: -10%;
      right: -10%;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, var(--accent-strong) 0%, transparent 70%);
      animation: float-glow 25s infinite alternate-reverse;
    }
    
    @keyframes float-glow {
      0% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(5vw, 5vh) scale(1.1);
      }
      100% {
        transform: translate(-2vw, -3vh) scale(0.9);
      }
    }

    /* Custom Header brand adjustments for Registration */
    .modern-header.scrolled {
      backdrop-filter: blur(16px);
      background: var(--header-bg-scrolled);
      border-bottom: 1px solid var(--header-border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
    }

    /* Auth Wrapper & Glassmorphism Card */
    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      padding: 100px 20px 40px;
      box-sizing: border-box;
    }

    .auth-card {
      background: var(--panel-strong);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(25px);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      position: relative;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    .auth-card:hover {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
    }

    .auth-card-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-card-header h2 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth-card-header p {
      font-size: 15px;
      color: var(--text-muted);
    }

    /* Floating Labels Form Group */
    .form-group-floating {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }

    .input-icon-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon-wrapper input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--input-text);
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-icon-wrapper input:focus {
      border-color: var(--button-primary);
      background: var(--panel-strong);
      box-shadow: 0 0 0 4px var(--button-shadow);
    }

    .input-icon-wrapper label {
      position: absolute;
      left: 44px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      font-size: 15px;
      font-weight: 500;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    /* Label floats up when input focused or has text */
    .input-icon-wrapper input:focus ~ label,
    .input-icon-wrapper input:not(:placeholder-shown) ~ label {
      top: 0;
      left: 12px;
      font-size: 11px;
      padding: 2px 6px;
      background: var(--floating-label-bg);
      color: var(--button-primary);
      font-weight: 700;
      border-radius: 4px;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      color: var(--text-soft);
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .input-icon-wrapper input:focus ~ .field-icon {
      color: var(--button-primary);
    }

    /* Password Toggle Button */
    .password-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
      z-index: 10;
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    /* Submit Button with Loading State */
    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--button-primary) 0%, var(--button-primary-hover) 100%);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--button-shadow);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .submit-btn:disabled {
      background: var(--input-border);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      opacity: 0.8;
    }
    
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error Alert Banner */
    .error-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      animation: slide-down 0.3s ease-out;
    }
    
    @keyframes slide-down {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .error-banner-icon {
      flex-shrink: 0;
    }

    /* Footer styling inside card */
    .auth-card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .auth-card-footer a {
      color: var(--button-primary);
      text-decoration: none;
      font-weight: 600;
    }
    
    .auth-card-footer a:hover {
      text-decoration: underline;
    }

    /* Shake card animation on error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-8px); }
      30%, 60%, 90% { transform: translateX(8px); }
    }
    
    .auth-card.shake {
      animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
</head>

<body>
  <!-- Background Light Glows -->
  <div class="glow-bg">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
  </div>

  <!-- Custom mouse cursor elements -->
  <div class="cursor"></div>
  <div class="cursor-tail">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <!-- Brand Navigation Header -->
  <header id="main-header" class="modern-header scrolled">
    <div class="header-content">
      <a href="index.html" class="brand-logo">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13"></rect>
            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
            <circle cx="5.5" cy="18.5" r="2.5"></circle>
            <circle cx="18.5" cy="18.5" r="2.5"></circle>
          </svg>
        </span>
        <span class="logo-text">Transport<span class="highlight">Co.</span></span>
      </a>
      <div class="header-actions">
        <a href="index.html" class="btn-text">Home</a>
        <button class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle-label">Dark Mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Sign Up Card Form Wrapper -->
  <div class="auth-wrapper">
    <div class="auth-card" id="auth-card">
      <div class="auth-card-header">
        <h2>Create Account</h2>
        <p>Join MooVit global transportation network</p>
      </div>

      <!-- Custom Alert Banner for validations -->
      <div class="error-banner" id="error-banner">
        <svg class="error-banner-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="error-banner-text"></span>
      </div>

      <form id="register-form">
        <!-- Floating label Name field -->
        <div class="form-group-floating">
          <div class="input-icon-wrapper">
            <svg class="field-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" name="name" id="name" required placeholder=" ">
            <label for="name">Full Name</label>
          </div>
        </div>

        <!-- Floating label Email field -->
        <div class="form-group-floating">
          <div class="input-icon-wrapper">
            <svg class="field-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" name="email" id="email" required placeholder=" ">
            <label for="email">Email Address</label>
          </div>
        </div>

        <!-- Floating label Password field -->
        <div class="form-group-floating">
          <div class="input-icon-wrapper">
            <svg class="field-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="pwd" required placeholder=" ">
            <label for="pwd">Password</label>
            <button type="button" class="password-toggle" id="pwd-toggle" aria-label="Toggle password visibility">
              <svg class="eye-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-icon-hide" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Floating label Confirm Password field -->
        <div class="form-group-floating">
          <div class="input-icon-wrapper">
            <svg class="field-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="cpwd" required placeholder=" ">
            <label for="cpwd">Confirm Password</label>
            <button type="button" class="password-toggle" id="cpwd-toggle" aria-label="Toggle password visibility">
              <svg class="eye-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-icon-hide" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submit-btn">
          <span id="submit-btn-text">Register</span>
          <span class="btn-spinner" id="btn-spinner"></span>
        </button>

        <!-- Links footer -->
        <div class="auth-card-footer">
          <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="cursor.js"></script>
  <script>
    const root = document.documentElement;
    const body = document.body;
    const themeButton = document.querySelector('.theme-toggle');

    // Theme Management
    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      body.setAttribute('data-theme', theme);
      localStorage.setItem('moovit-theme', theme);

      const icon = themeButton.querySelector('.theme-toggle-icon');
      const label = themeButton.querySelector('.theme-toggle-label');
      const darkMode = theme === 'dark';

      themeButton.setAttribute('aria-pressed', String(darkMode));
      if (icon) icon.textContent = darkMode ? '☀️' : '🌙';
      if (label) label.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
    }

    const savedTheme = localStorage.getItem('moovit-theme') || 'light';
    applyTheme(savedTheme);

    themeButton.addEventListener('click', () => {
      const currentTheme = root.getAttribute('data-theme') || 'light';
      const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme(nextTheme);
    });

    // Helper for password visibility toggle
    function setupPasswordToggle(inputEl, buttonEl) {
      const eyeShow = buttonEl.querySelector('.eye-icon-show');
      const eyeHide = buttonEl.querySelector('.eye-icon-hide');

      buttonEl.addEventListener('click', () => {
        const isPassword = inputEl.getAttribute('type') === 'password';
        inputEl.setAttribute('type', isPassword ? 'text' : 'password');
        if (isPassword) {
          eyeShow.style.display = 'none';
          eyeHide.style.display = 'block';
        } else {
          eyeShow.style.display = 'block';
          eyeHide.style.display = 'none';
        }
      });
    }

    setupPasswordToggle(document.getElementById('pwd'), document.getElementById('pwd-toggle'));
    setupPasswordToggle(document.getElementById('cpwd'), document.getElementById('cpwd-toggle'));

    // Form Submission & Validation
    const authCard = document.getElementById('auth-card');
    const errorBanner = document.getElementById('error-banner');
    const errorBannerText = document.getElementById('error-banner-text');
    const registerForm = document.getElementById('register-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitBtnText = document.getElementById('submit-btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    function showError(msg) {
      errorBannerText.textContent = msg;
      errorBanner.style.display = 'flex';
      
      // Shake card
      authCard.classList.remove('shake');
      void authCard.offsetWidth; // Trigger reflow to restart animation
      authCard.classList.add('shake');
    }

    function clearError() {
      errorBanner.style.display = 'none';
      errorBannerText.textContent = '';
    }

    registerForm.addEventListener('submit', function (e) {
      e.preventDefault();
      clearError();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pwd').value;
      const confirmPassword = document.getElementById('cpwd').value;

      // Check for empty fields
      if (!name || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }

      // Name validation (only alphabets and spaces)
      const namePattern = /^[A-Za-z ]+$/;
      if (!namePattern.test(name)) {
        showError('Name should contain only alphabets and spaces.');
        return;
      }

      // Email validation
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      // Password strength validation
      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPasswordPattern.test(password)) {
        showError('Password must be at least 8 characters and include uppercase, lowercase, number, and special character.');
        return;
      }

      // Confirm password match
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      // Show Loading State on submit button
      submitBtn.disabled = true;
      submitBtnText.textContent = 'Creating account...';
      btnSpinner.style.display = 'inline-block';

      // Redirect after processing delay
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    });
  </script>
</body>

</html>
