<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../favicon.png">
  <title>Live Object Detection</title>
  <link rel="stylesheet" href="live-detection.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script src="../scripts/detection-core.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>Live Object Detection 🔍</h1>
    <a href="../main.html" class="btn btn-light">← Home</a>
  </header>

  <main>
    <p class="description">This feature helps low-vision users by detecting objects in real time and providing spoken
      alerts.</p>
    <div class="controls">
      <label for="voiceLang">Voice language</label>
      <select id="voiceLang" aria-label="Voice alert language">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
      </select>
    </div>
    <div id="wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <p class="small-text"><small>Powered by TensorFlow.js COCO-SSD model with speech output</small></p>
  </main>

  <footer>
    <p>&copy; 2025 MooVit.</p>
  </footer>

  <script src="live-detection.js"></script>
</body>

</html>
