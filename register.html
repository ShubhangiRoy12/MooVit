<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>Register - Transport Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --secondary: #1d4ed8;
      --accent: #f59e0b;
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --text-color: #ffffff;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)),
        url('home_hero.png.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    /* Abstract background shapes */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 10s ease-in-out infinite alternate;
    }
    body::before {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: rgba(37, 99, 235, 0.3);
    }
    body::after {
      bottom: -10%;
      right: -10%;
      width: 40vw;
      height: 40vw;
      background: rgba(245, 158, 11, 0.2);
      animation-delay: -5s;
    }
    
    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .auth-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary-light);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .auth-container a {
      color: var(--primary-light);
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 500;
    }

    .auth-container a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .auth-container button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .auth-container button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }
    
    .auth-container button[type="submit"]:active {
      transform: translateY(0);
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }

    #error-msg {
      color: #f87171;
      text-align: center;
      margin-bottom: 15px;
      font-size: 13px;
      min-height: 18px;
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <form id="register-form">
      <h2>Sign Up at Transport Co.</h2>
      
      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Your full name" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="you@example.com" required>
      </div>
      
      <div class="input-group">
        <label for="pwd">Password</label>
        <input id="pwd" type="password" placeholder="Create password" required>
      </div>

      <div class="input-group">
        <label for="cpwd">Confirm Password</label>
        <input id="cpwd" type="password" placeholder="Confirm password" required>
      </div>
      
      <div id="error-msg"></div>
      
      <button type="submit">Register</button>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </form>
  </div>
  
  <script>
    document.getElementById('register-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pwd').value;
      const confirmPassword = document.getElementById('cpwd').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = '';

      // Check for empty fields
      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      // Name validation (only alphabets and spaces)
      const namePattern = /^[A-Za-z ]+$/;
      if (!namePattern.test(name)) {
        errorMsg.textContent = 'Name should contain only alphabets and spaces.';
        return;
      }

      // Email validation
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        return;
      }

      // Password strength validation
      // Minimum 8 characters, at least one uppercase, one lowercase, one digit, and one special character
      const strongPasswordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]).{8,}$/;
      if (!strongPasswordPattern.test(password)) {
        errorMsg.textContent = 'Password must be at least 8 chars and include upper, lower, number, and special char.';
        return;
      }

      // Confirm password match
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      // If all validations pass, redirect
      window.location.href = 'login.html';
    });
  </script>
</body>

</html>
